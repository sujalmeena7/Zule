# ============================================
# Zule AI — Electron Builder Configuration
# ============================================
# Targets Windows only (as per user requirement)

appId: com.zule.ai
productName: Zule AI
copyright: Copyright © 2024 Zule AI

directories:
  buildResources: public
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - public/favicon.ico
  - public/favicon.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/favicon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Zule AI
  artifactName: ZuleAI-setup.exe

# Auto-update configuration (Phase 4)
publish:
  provider: github
  owner: zule-ai
  repo: zule
